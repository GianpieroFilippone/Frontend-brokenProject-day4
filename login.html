<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LipariBank — Accedi</title>
  <link rel="stylesheet" href="css/main.css" />
</head>
<body class="page--login">

  <div class="login-card">
    <div class="login-card__logo">
      <span class="logo-icon">🏦</span>
      <span class="logo-text">LipariBank</span>
    </div>

    <h1 class="login-card__title">Accedi al tuo conto</h1>

    <form id="loginForm" class="login-form" novalidate>
      <div class="form-group">
        <label for="loginEmail" class="form-label">Email</label>
        <input
          type="email"
          id="loginEmail"
          class="form-input"
          placeholder="demo@liparibank.it"
          autocomplete="email"
          required
        />
      </div>

      <div class="form-group">
        <label for="loginPassword" class="form-label">Password</label>
        <input
          type="password"
          id="loginPassword"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
          required
        />
      </div>

      <p id="loginError" class="form-error" style="display:none">
        Credenziali non valide. Riprova.
      </p>

      <button type="submit" class="btn btn--primary btn--full">Entra</button>
    </form>

    <p class="login-card__hint">
      Credenziali demo: <code>demo@liparibank.it</code> / <code>demo1234</code>
    </p>
  </div>

  <script type="module" src="dist/login-main.js"></script>
</body>
</html>
